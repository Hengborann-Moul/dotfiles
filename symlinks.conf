$(pwd)/iterm/Profiles.json:$HOME/Library/Application Support/iTerm2/DynamicProfiles/Profiles.json:mac

# Ubuntu-specific dotfiles
$(pwd)/zsh/custom-ubuntu.zsh:$HOME/.config/zsh/custom.zsh:ubuntu
$(pwd)/wezterm:$HOME/.config/wezterm:ubuntu
